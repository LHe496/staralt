      function getObservatoryCode(value) {
        if (typeof value === 'number' && !isNaN(value)) {
          return value;
        }
        if (typeof value === 'string') {
          if (ObservatoryMap.hasOwnProperty(value)) {
            return ObservatoryMap[value];
          }
        }
        return undefined;
      };
      function getObservatoryTimeZone(value) {
        const code = getObservatoryCode(value);
          if (code !== undefined && TimeZoneMap.hasOwnProperty(code)) {
            return TimeZoneMap[code];
          }
        return undefined;
      };
      function getObservatoryTimeZoneByLongtitude(value) {
        if (!value || typeof value !== 'string') return undefined;
        const tokens = value.trim().split(/\s+/);
        if (tokens.length === 0 || !tokens[0]) return undefined;
        let lng;
        if (tokens[0].includes('.')) {
          if (tokens.length < 2) return undefined;
          lng = parseFloat(tokens[0]);
        } else {
          if (tokens.length < 6) return undefined;
          const d = parseFloat(tokens[0]);
          const m = parseFloat(tokens[1]);
          const s = parseFloat(tokens[2]);
          if (isNaN(d) || isNaN(m) || isNaN(s)) return undefined;
          lng = d + m / 60 + s / 3600;
        }
        if (isNaN(lng)) return undefined;
        return Math.round(lng / 15);
      };
      const p = new URL(window.location.href).searchParams;
      let tz = undefined;
      let hasTZ = false;
      if (p.has('form[observatory]')) {
        tz = getObservatoryTimeZone(p.get('form[observatory]'))
        if (tz !== undefined) hasTZ = true;
      }
      if (!hasTZ && p.has('form[sitecoord]')) {
        tz = getObservatoryTimeZoneByLongtitude(p.get('form[sitecoord]'))
      }
      if (tz === undefined) {
        window.location.replace('https://astro.ing.iac.es/staralt/');
      } else {
        const logicalLocal = new Date(Date.now() + (tz - 10) * 3600000);
        const localYear = logicalLocal.getUTCFullYear();
        const localMonth = logicalLocal.getUTCMonth();
        const localDate = logicalLocal.getUTCDate();
        const localEvening = Date.UTC(localYear, localMonth, localDate, 18, 0, 0);
        const d = new Date(localEvening - tz * 3600000);

        p.set('form[year]', d.getUTCFullYear());
        p.set('form[month]', String(d.getUTCMonth() + 1).padStart(2, '0'));
        p.set('form[day]', String(d.getUTCDate()).padStart(2, '0'));
